name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-and-build:
    # Hard rule for this org's public repos: never run PR-triggered work on
    # the self-hosted runner (it has homelab network access). GitHub-hosted
    # only, always.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

      - name: Build
        run: bun run build
