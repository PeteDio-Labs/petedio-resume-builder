# petedio-resume-builder — CD (deploy on merge).
#   On push to main, the self-hosted homelab runner deploys the app NATIVELY to resume-242 by
#   running petedio-iac's tested play `configure-resume-builder.yml`. It mirrors the palworld
#   panel's deploy.yml: mint creds via GitHub OIDC → Vault, run in Docker, pass secrets as an
#   -e @file (never on argv, never logged).
#
#   This is the SAME play the operator validates by hand first via
#   petedio-iac/scripts/deploy-resume-builder.sh — the runner just runs it on merge.
#
#   DIFFERENT FROM THE PANEL: the panel ships TypeScript that bun runs directly, so its deploy
#   copies source. This app is SvelteKit + adapter-node and must be BUILT first — the play
#   asserts `build/index.js` exists on the controller and refuses to deploy without it. So we
#   build in a bun container before handing the checkout to ansible. Runtime deps are NOT
#   installed here: the play runs `bun install --production` on the target, because native
#   modules built on the runner would be the wrong architecture.
#
#   Runs ONLY on push to main (never on PRs): PR-controlled code must never touch the
#   self-hosted runner. Requires the `resume-builder-cd` Vault OIDC role (petedio-iac,
#   vault-config — operator-applied, NOT applied by CI); without it the vault-action login 403s.
name: deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-resume-builder # serialize deploys against resume-242
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # mint the GitHub OIDC token vault-action exchanges for a Vault token

env:
  ANSIBLE_IMAGE: python:3.12-slim
  BUN_IMAGE: oven/bun:1

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, homelab] # inside the LAN — can reach resume-242
    steps:
      - name: Checkout app (source to build + deploy)
        uses: actions/checkout@v6
        with:
          path: app

      - name: Checkout petedio-iac (ansible play + inventory)
        uses: actions/checkout@v6
        with:
          repository: PeteDio-Labs/petedio-iac
          ref: main
          path: iac

      - name: Encode Vault CA
        id: vault_ca
        working-directory: iac/environments/homelab
        run: echo "b64=$(base64 -w0 vault-ca.crt)" >> "$GITHUB_OUTPUT"

      - name: Vault — SSH key + app secrets via OIDC
        uses: hashicorp/vault-action@v4
        with:
          url: https://192.168.50.223:8200
          method: jwt
          path: jwt-github # non-default mount — must be explicit or Vault 403s
          role: resume-builder-cd
          jwtGithubAudience: https://github.com/PeteDio-Labs
          caCertificate: ${{ steps.vault_ca.outputs.b64 }}
          exportEnv: true
          secrets: |
            kv/data/iac/lxc-ssh private_key | ANSIBLE_SSH_KEY ;
            kv/data/services/resume-builder mongo_app_password | APP_MONGO_PW ;
            kv/data/services/resume-builder cf_access_team_domain | APP_CF_TEAM_DOMAIN ;
            kv/data/services/resume-builder cf_access_aud | APP_CF_AUD ;
            kv/data/services/resume-builder allowed_users | APP_ALLOWED_USERS

      # Build in a container so the runner needs no bun of its own. --user keeps build/
      # owned by the runner user; without it the next step and the workspace cleanup hit
      # root-owned files. HOME must be writable for bun's cache.
      - name: Build the app (bun in Docker)
        shell: bash
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -v "$GITHUB_WORKSPACE/app:/app" -w /app \
            "$BUN_IMAGE" sh -c "bun install --frozen-lockfile && bun run build"
          # The play asserts this too, but failing here says "the build broke" rather than
          # "ansible could not find a file".
          test -f "$GITHUB_WORKSPACE/app/build/index.js" \
            || { echo "::error::build/index.js missing — adapter-node output path changed?"; exit 1; }

      - name: Deploy to resume-242 (ansible in Docker)
        shell: bash
        run: |
          umask 077
          CI="/tmp/ci-resume-builder"
          rm -rf "$CI"; mkdir -p "$CI"
          trap 'rm -rf "$CI"' EXIT
          printf '%s\n' "$ANSIBLE_SSH_KEY" > "$CI/key"; chmod 600 "$CI/key"
          # Secret + path extra-vars via a JSON @file — never on argv, never logged.
          python3 - "$CI/evars.json" <<'PY'
          import json, os, sys
          ev = {
              "ansible_ssh_private_key_file": "/ci/key",
              "resume_builder_mongo_password": os.environ["APP_MONGO_PW"],
              "resume_builder_cf_access_team_domain": os.environ["APP_CF_TEAM_DOMAIN"],
              "resume_builder_cf_access_aud": os.environ["APP_CF_AUD"],
              "resume_builder_allowed_users": os.environ["APP_ALLOWED_USERS"],
              "resume_builder_src": "/src",
          }
          json.dump(ev, open(sys.argv[1], "w"))
          PY
          docker run --rm --network host \
            -v "$GITHUB_WORKSPACE/iac/ansible:/ansible" \
            -v "$GITHUB_WORKSPACE/app:/src:ro" \
            -v "$CI:/ci:ro" -w /ansible \
            -e ANSIBLE_HOST_KEY_CHECKING=False \
            -e ANSIBLE_TRANSFORM_INVALID_GROUP_CHARS=ignore \
            "$ANSIBLE_IMAGE" sh -c \
            "apt-get update -q >/dev/null && apt-get install -y -q openssh-client >/dev/null && \
             pip install -q ansible-core && \
             ansible-galaxy collection install community.general && \
             ansible-playbook -i inventory/hosts.yml playbooks/configure-resume-builder.yml -e @/ci/evars.json"
